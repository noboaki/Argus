syntax = "proto3";

package argus;

option go_package = "argus/proto";

service IngestionService {
  rpc SendMetrics(stream MetricBatch) returns (Ack);
}

message Metric {
  string name = 1;
  double value = 2;
  int64 timestamp = 3;
  map<string,string> labels = 4;
}

message MetricBatch {
  string agent_id = 1;
  string hostname = 2;
  repeated Metric metrics = 3;
}

message Ack {
  bool success = 1;
}